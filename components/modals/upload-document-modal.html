<div class="modal-overlay" id="upload-document-modal">
<div class="antd-modal-content">
<div class="antd-modal-header">
<h2>Upload Medical Documents</h2>
<button class="modal-close" onclick="closeModal('upload-document-modal')">×</button>
</div>
<p style="font-size:13px; color:#666; margin-bottom:15px;">To speed up your claim, please upload clear photos or PDFs.</p>
<label>Document Type *</label>
<select class="antd-input">
<option>Final Hospital Bill (Required for Discharge)</option>
<option>Discharge Summary (Required for Discharge)</option>
<option>Investigation/Lab Reports</option>
<option>Doctor's Prescription</option>
</select>
<div class="file-upload-area" style="padding: 20px;">
<p style="font-size: 32px; margin:0;"><i data-lucide="camera" class="icon-sm"></i> / <i data-lucide="file-text" class="icon-sm"></i></p>
<p style="margin:5px 0;">Tap to Take Photo or Browse</p>
</div>
<button class="antd-btn antd-btn-primary" onclick="closeModal('upload-document-modal')" style="width:100%; height:45px;">Upload File</button>
</div>
</div>
