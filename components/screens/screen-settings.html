<div class="screen" id="screen-settings">
<div class="antd-flex antd-items-center antd-mb-6">
  <h2 class="antd-text-large" style="margin: 0;"><i data-lucide="settings" class="icon-sm"></i> Settings</h2>
</div>
<div class="antd-card" style="max-width: 600px;">
  <h3 class="antd-card-title">Notification Preferences</h3>
  <div class="antd-flex antd-items-center antd-justify-between antd-mb-4">
    <div>
      <p class="antd-text-strong" style="margin: 0;">Receive SMS Alerts</p>
      <p class="antd-text-secondary" style="margin: 0;">Get claim updates on your phone</p>
    </div>
    <input type="checkbox" checked="" style="width: 16px; height: 16px; cursor: pointer;"/>
  </div>
  <div class="antd-flex antd-items-center antd-justify-between antd-mb-4">
    <div>
      <p class="antd-text-strong" style="margin: 0;">Receive Email Alerts</p>
      <p class="antd-text-secondary" style="margin: 0;">Monthly statements and policy documents</p>
    </div>
    <input type="checkbox" checked="" style="width: 16px; height: 16px; cursor: pointer;"/>
  </div>
  
  <h3 class="antd-card-title antd-mt-6">Billing Settings</h3>
  <div class="antd-flex antd-items-center antd-justify-between antd-mb-6">
    <div>
      <p class="antd-text-strong" style="margin: 0;">Enable Auto-Pay for Renewals</p>
      <p class="antd-text-secondary" style="margin: 0;">Automatically charge your saved card</p>
    </div>
    <input type="checkbox" style="width: 16px; height: 16px; cursor: pointer;"/>
  </div>
  
  <button class="antd-btn antd-btn-primary">Save Preferences</button>
</div>
</div>
