<div class="screen" id="screen-profile">
<div class="antd-flex antd-items-center antd-mb-6">
  <h2 class="antd-text-large" style="margin: 0;"><i data-lucide="user" class="icon-sm"></i> User Profile</h2>
</div>
<div class="antd-grid-2" style="max-width: 1000px; margin: 0 auto;">
  <div class="antd-card">
    <h3 class="antd-card-title">Personal Details</h3>
    <div class="antd-mb-4">
      <label class="antd-text-secondary" style="display: block; margin-bottom: 8px;">Full Name</label>
      <input class="antd-input" type="text" value="Rahul Sharma" />
    </div>
    <div class="antd-mb-4">
      <label class="antd-text-secondary" style="display: block; margin-bottom: 8px;">Date of Birth</label>
      <input class="antd-input" type="date" value="1988-05-12" />
    </div>
    <div class="antd-mb-4">
      <label class="antd-text-secondary" style="display: block; margin-bottom: 8px;">Phone</label>
      <input class="antd-input" type="tel" value="+91 9876543210" />
    </div>
    <button class="antd-btn antd-btn-primary">Update Details</button>
  </div>
  <div class="antd-card">
    <h3 class="antd-card-title">KYC &amp; Verification</h3>
    <div class="antd-flex antd-justify-between antd-items-center antd-mb-4" style="padding-bottom: 16px; border-bottom: 1px solid var(--antd-border);">
      <div>
        <p class="antd-text-secondary" style="margin: 0;">Aadhaar</p>
        <p class="antd-text-strong" style="margin: 0;">XXXX-XXXX-1234</p>
      </div>
      <span class="antd-tag antd-tag-success">Verified</span>
    </div>
    <div class="antd-flex antd-justify-between antd-items-center antd-mb-6">
      <div>
        <p class="antd-text-secondary" style="margin: 0;">PAN</p>
        <p class="antd-text-strong" style="margin: 0;">ABCXXXXX1Z</p>
      </div>
      <span class="antd-tag antd-tag-success">Verified</span>
    </div>
    <button class="antd-btn">Update KYC</button>
  </div>
</div>
</div>
