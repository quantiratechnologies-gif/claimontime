<div class="screen" id="screen-ai">
<h2><i data-lucide="bot" class="icon-sm"></i> Super AI Assistant</h2>
<p style="margin-bottom:10px;">Ask anything about your policy, claims, or hospitals.</p>
<div class="card" style="background:#f5f5f5;">
<strong>Suggested Questions:</strong><br/>
<button class="btn btn-secondary" onclick="askAI('Is my knee surgery covered?')">Is my knee surgery covered?</button>
<button class="btn btn-secondary" onclick="askAI('What is my remaining coverage?')">What is my remaining coverage?</button>
<button class="btn btn-secondary" onclick="askAI('Find a cardiologist near me')">Find a cardiologist near me</button>
<button class="btn btn-secondary" onclick="askAI('Why was my claim rejected?')">Why was my claim rejected?</button>
<button class="btn btn-secondary" onclick="askAI('How to file a claim?')">How to file a claim?</button>
</div>
<div class="chat-box">
<div class="chat-messages" id="chat-messages">
<div class="msg msg-ai">👋 Hi Rahul! I'm your SuperClaim AI. How can I help you today?</div>
</div>
<div class="chat-input">
<input class="form-control" id="chat-input" onkeypress="if(event.key==='Enter') sendChat()" placeholder="Type your question..." type="text"/>
<button class="btn" onclick="sendChat()">Send</button>
<button class="btn btn-secondary" onclick="openModal('voice-input-modal')"><i data-lucide="mic" class="icon-sm"></i></button>
</div>
</div>
</div>
